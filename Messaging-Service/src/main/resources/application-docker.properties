spring.application.name=MESSAGING-SERVICE
server.port=8086

# ===============================
# RABBITMQ (Docker)
# ===============================
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ===============================
# EMAIL (Docker ENV based)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=hrishabhpatel19@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# QUEUE
# ===============================
rabbitmq.queue.name=booking_notification_queue
rabbitmq.exchange.name=booking_exchange
rabbitmq.routing.key=booking_routing_key

# ===============================
# DISABLE EUREKA
# ===============================
eureka.client.service-url.defaultZone=http://server:8761/eureka
# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
