spring.application.name=Booking
server.port=8084

# ===============================
# DATABASE (Docker MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://mysql:3306/FlightBookingSystem
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

flight.service.url=http://flight-service:8082
payment.service.url=http://payment-service:8085
messaging.service.url=http://messaging-service:8086


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# ===============================
# SWAGGER / OPENAPI
# ===============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =========
# ===============================
# EUREKA (THIS IS THE FIX)
eureka.client.service-url.defaultZone=http://server:8761/eureka
# ===============================
# ===============================
# ? FULLY DISABLE EUREKA (HARD STOP)
# ===============================
#eureka.client.enabled=false
#eureka.client.register-with-eureka=false
#eureka.client.fetch-registry=false

spring.cloud.discovery.enabled=false
spring.cloud.loadbalancer.enabled=false
