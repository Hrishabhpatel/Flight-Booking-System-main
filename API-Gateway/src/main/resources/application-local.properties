# ======================================
# DOCKER
# ======================================

spring.application.name=API-Gateway
server.port=8091

# Gateway Routes (Docker service names)
spring.cloud.gateway.routes[0].id=flight
spring.cloud.gateway.routes[0].uri=http://flight-service:8082
spring.cloud.gateway.routes[0].predicates[0]=Path=/flights/**

spring.cloud.gateway.routes[1].id=search
spring.cloud.gateway.routes[1].uri=http://search-service:8083
spring.cloud.gateway.routes[1].predicates[0]=Path=/search/**

spring.cloud.gateway.routes[2].id=security
spring.cloud.gateway.routes[2].uri=http://security-service:8081
spring.cloud.gateway.routes[2].predicates[0]=Path=/security/**

spring.cloud.gateway.routes[3].id=booking
spring.cloud.gateway.routes[3].uri=http://booking-service:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/bookings/**

spring.cloud.gateway.routes[4].id=messaging
spring.cloud.gateway.routes[4].uri=http://messaging-service:8086
spring.cloud.gateway.routes[4].predicates[0]=Path=/message/**

spring.cloud.gateway.routes[5].id=payment
spring.cloud.gateway.routes[5].uri=http://payment-service:8085
spring.cloud.gateway.routes[5].predicates[0]=Path=/pay/**


